name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish
          fish --version
      - name: fish_indent --check
        shell: fish {0}
        run: |
          set -l failed 0
          for f in (find conf.d functions tests -name '*.fish')
              if not fish_indent --check $f
                  echo "::error file=$f::fish_indent would modify this file"
                  set failed 1
              end
          end
          exit $failed

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish curl
          fish --version
      - name: Install fisher and fishtape
        shell: fish {0}
        run: |
          curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source
          and fisher install jorgebucaran/fisher
          and fisher install jorgebucaran/fishtape
      - name: Run fishtape
        shell: fish {0}
        run: fishtape tests/*.test.fish
